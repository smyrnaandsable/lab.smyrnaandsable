name: Sovereign Signal Processor
on:
  repository_dispatch:
    types: [waste_oracle_signal]
  workflow_dispatch: # Bu satır "Run workflow" butonunu getirir!

jobs:
  analyze_signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Execute Waste Oracle Engine
        env:
          SIGNAL_KEY: ${{ secrets.SIGNAL_TOKEN }} 
        run: |
          # Manuel çalıştırırken payload boş olmasın diye bir varsayılan ekledik
          python scripts/waste_oracle_engine.py '${{ github.event.client_payload || "{\"user_agent\": \"Manual-Test\", \"path\": \"/lab\"}" }}'
