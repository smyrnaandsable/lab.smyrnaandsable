name: Sovereign Signal Processor
on:
  workflow_dispatch:
  repository_dispatch:
    types: [waste_oracle_signal]

jobs:
  analyze_signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Engine
        env:
          SIGNAL_KEY: ${{ secrets.SIGNAL_TOKEN }}
        run: |
          # Önce dosya orada mı kontrol et, sonra çalıştır
          ls -R
          python scripts/waste_oracle_engine.py "manual_trigger"
