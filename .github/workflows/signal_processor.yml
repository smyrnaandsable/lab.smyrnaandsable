name: Sovereign Signal Processor
on:
  workflow_dispatch:
  repository_dispatch:
    types: [waste_oracle_signal]

permissions:
  contents: write

jobs:
  analyze_signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Engine
        env:
          SIGNAL_KEY: ${{ secrets.SIGNAL_TOKEN }}
        run: |
          python scripts/waste_oracle_engine.py "manual_trigger"
          # Dosyanın oluştuğunu GitHub'a ispatlayalım
          ls -R logs

      - name: Commit and Push Logs
        run: |
          git config --global user.name 'Sovereign Lab Bot'
          git config --global user.email 'lab@smyrnaandsable.com'
          # Eğer dosya yoksa hata vermemesi için '|| true' ekledik
          git add logs/signal_history.json || true
          git commit -m "System: Update Signal Logs" || echo "No changes"
          git push