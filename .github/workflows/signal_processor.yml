name: Sovereign Signal Processor

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason'
        required: false
        default: 'Manual Audit'
  schedule:
    - cron: '0 6 * * 2'

jobs:
  run-oracle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Execute Engine
        run: |
          python scripts/waste_oracle_engine.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Sovereign-Oracle-Bot"
          git config --global user.email "bot@smyrnaandsable.com"
          git add logs/signal_history.json
          git commit -m "Otonom Sinyal İşlendi: $(date)" || echo "No changes to commit, proceeding."
          git push