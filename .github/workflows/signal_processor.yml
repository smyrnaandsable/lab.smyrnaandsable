name: Sovereign Signal Processor
on:
  workflow_dispatch:
  repository_dispatch:
    types: [waste_oracle_signal]

permissions:
  contents: write

jobs:
  analyze_signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Engine
        run: python scripts/waste_oracle_engine.py "manual_trigger"

      - name: Commit and Push Logs
        run: |
          git config --global user.name 'Sovereign Lab Bot'
          git config --global user.email 'lab@smyrnaandsable.com'
          git add logs/signal_history.json
          git commit -m "System: Update Signal Logs" || exit 0
          git push