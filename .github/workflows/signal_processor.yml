name: Sovereign Signal Processor

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 2'
  repository_dispatch:
    types: [waste_oracle_signal]

permissions:
  contents: write

jobs:
  analyze_signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Engine
        run: python scripts/waste_oracle_engine.py "scheduled_bureau_check"
        env:
          ORACLE_TOKEN: ${{ secrets.ORACLE_TOKEN }}

      - name: Commit and Push Logs
        run: |
          git config --global user.name 'Sovereign Lab Bot'
          git config --global user.email 'lab@smyrnaandsable.com'
          mkdir -p logs
          touch logs/signal_history.json
          git add logs/signal_history.json
          git commit -m "System: Automated Weekly Marketing Budget Audit" || echo "No changes to commit"
          git push origin main
        env:
          ORACLE_TOKEN: ${{ secrets.ORACLE_TOKEN }}