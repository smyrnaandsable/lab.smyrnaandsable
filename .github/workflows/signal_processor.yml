name: Sovereign Signal Processor
on:
  repository_dispatch:
    types: [waste_oracle_signal]

jobs:
  analyze_signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Execute Waste Oracle Engine
        env:
          # İşte burası! GitHub senin kaydettiğin Secret'ı burada kullanacak.
          SIGNAL_KEY: ${{ secrets.SIGNAL_TOKEN }} 
        run: |
          python scripts/waste_oracle_engine.py '${{ github.event.client_payload }}'
