name: Sovereign Signal Processor
on:
  workflow_dispatch:
  repository_dispatch:
    types: [waste_oracle_signal]

jobs:
  analyze_signal:
    runs-on: ubuntu-latest
    # Bu izin, GitHub'ın kendi dosyalarına yazabilmesi için şart
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Waste Oracle Engine
        env:
          SIGNAL_KEY: ${{ secrets.SIGNAL_TOKEN }}
        run: |
          python scripts/waste_oracle_engine.py '${{ github.event.client_payload || "{\"user_agent\": \"Manual-Test\", \"path\": \"/lab\"}" }}'

      - name: Commit and Push Logs
        run: |
          git config --global user.name 'Sovereign Lab Bot'
          git config --global user.email 'lab@smyrnaandsable.com'
          git add logs/signal_history.json
          git commit -m "System: Update Signal Logs [Automated]" || echo "No changes to commit"
          git push